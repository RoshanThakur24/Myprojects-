<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>16-Digit PDF Unlocker</title>
    <!-- Official PDF.js library to read and test the locked PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #111;
            color: #0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #222;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            width: 90%;
            max-width: 650px;
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
        }
        h2 {
            margin-top: 0;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        #drop-zone {
            width: 100%;
            height: 120px;
            border: 2px dashed #0f0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #0f0;
            margin-bottom: 25px;
            box-sizing: border-box;
            background: rgba(0, 255, 0, 0.05);
            transition: 0.3s;
            cursor: pointer;
        }
        #drop-zone.dragover {
            background-color: rgba(0, 255, 0, 0.2);
            border-style: solid;
        }
        .password-display {
            font-size: 2rem;
            letter-spacing: 3px;
            background: #000;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #0f0;
            margin: 20px 0;
            display: inline-block;
        }
        .locked-digit {
            color: #fff; /* White for the known digits */
        }
        .spinning-digit {
            color: #0f0; /* Green for the middle changing digits */
        }
        #status {
            font-size: 1rem;
            color: #aaa;
            font-family: Arial, sans-serif;
            min-height: 20px;
        }
        .success-text {
            color: #fff !important;
            background: #008000 !important;
            border-color: #fff !important;
            box-shadow: 0 0 30px #008000;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>16-Digit PDF Target Locator</h2>
        <div id="drop-zone">Drag & Drop Locked PDF Here</div>
        
        <div id="status">Awaiting file...</div>
        
        <!-- This shows the exact 16-digit password being tested -->
        <div class="password-display" id="pwd-display">
            <span class="locked-digit">3933</span><span class="spinning-digit">XXXXXXXX</span><span class="locked-digit">4032</span>
        </div>
    </div>

    <script>
        // Setup PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const dropZone = document.getElementById('drop-zone');
        const status = document.getElementById('status');
        const pwdDisplay = document.getElementById('pwd-display');
        let isRunning = false;

        // Prevent default drag behaviors
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, e => { e.preventDefault(); e.stopPropagation(); }, false);
            document.body.addEventListener(eventName, e => { e.preventDefault(); e.stopPropagation(); }, false);
        });

        // Add visual effect when dragging over
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });
        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        // Handle the PDF drop
        dropZone.addEventListener('drop', (e) => {
            if (isRunning) return; 
            
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type === 'application/pdf') {
                status.innerText = "PDF Detected. Extracting data into memory...";
                
                const reader = new FileReader();
                reader.onload = function(evt) {
                    const pdfData = new Uint8Array(evt.target.result);
                    status.innerText = "Target locked. Commencing brute-force...";
                    runPasswordCrack(pdfData);
                };
                reader.readAsArrayBuffer(files[0]);
            } else {
                status.innerText = "Error: Invalid file. Please drop a locked PDF.";
            }
        });

        async function runPasswordCrack(pdfData) {
            isRunning = true;
            const prefix = "3933";
            const suffix = "4032";
            const totalPossibilities = 100000000; // 100,000,000

            for (let i = 0; i < totalPossibilities; i++) {
                // Generate the 8-digit middle part (00000000 to 99999999)
                let middle = i.toString().padStart(8, '0');
                
                // Combine them to make the FULL 16-digit password
                let full16DigitPassword = prefix + middle + suffix;

                // Update the screen every 25 attempts so you can see the middle digits spinning
                if (i % 25 === 0) {
                    pwdDisplay.innerHTML = \`<span class="locked-digit">\${prefix}</span><span class="spinning-digit">\${middle}</span><span class="locked-digit">\${suffix}</span>\`;
                    // Brief pause to let the browser draw the numbers on the screen
                    await new Promise(resolve => setTimeout(resolve, 0)); 
                }

                // Test the full 16-digit password against the PDF
                try {
                    const loadingTask = pdfjsLib.getDocument({
                        data: pdfData,
                        password: full16DigitPassword
                    });
                    
                    // If it successfully loads, the promise resolves and WE FOUND IT
                    await loadingTask.promise; 
                    
                    // --- SUCCESS LOGIC ---
                    status.innerText = "SUCCESS! Target located.";
                    status.style.color = "#fff";
                    
                    // Display the final full 16-digit password permanently on screen
                    pwdDisplay.innerHTML = \`<span class="locked-digit">\${prefix}</span><span class="locked-digit">\${middle}</span><span class="locked-digit">\${suffix}</span>\`;
                    pwdDisplay.classList.add('success-text');
                    
                    isRunning = false;
                    return; // Stop the loop

                } catch (error) {
                    // If the PDF throws a 'PasswordException', the 16-digit guess was wrong.
                    // The loop ignores it and immediately moves to the next number.
                    if (error.name !== 'PasswordException') {
                        status.innerText = "Critical Error: PDF is corrupted or unreadable.";
                        isRunning = false;
                        return;
                    }
                }
            }

            // If it finishes all 100 million without a hit
            status.innerText = "Scan complete. Target not found in 100,000,000 attempts.";
            isRunning = false;
        }
    </script>
</body>
</html>
